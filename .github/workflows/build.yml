name: Build and Release PDF
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v4
        with:
          root_file: book.tex
          latexmk_use_xelatex: true
          args: "-pdfxe -outdir=build -auxdir=build"

      - name: Fix build directory permissions
        run: sudo chmod -R 777 build

      - name: Install qpdf and encrypt PDF
        run: |
          sudo apt-get update && sudo apt-get install -y qpdf
          qpdf --encrypt "" "${{ secrets.PDF_OWNER_PASSWORD }}" 256 \
                --modify=none --annotate=y --extract=n -- \
                build/book.pdf build/book-encrypted.pdf
          mv build/book-encrypted.pdf build/book.pdf
        env:
          PDF_OWNER_PASSWORD: ${{ secrets.PDF_OWNER_PASSWORD }}

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v7
        with:
          name: book-pdf
          path: build/book.pdf

      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" )
          else
            LOG=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s (%h)" )
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate release tag
        id: tag
        run: echo "TAG=$(date -u +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: Build ${{ steps.tag.outputs.TAG }}
          files: build/book.pdf
          body: |
            ${{ steps.time.outputs.NOW }}
            ${{ steps.changelog.outputs.CHANGELOG }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update 'latest' tag
        run: |
          git tag -f latest
          git push origin latest --force